<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <!-- 移除舊的 arjs 載入，改用最新的 WebAR 相機流相容版本 -->
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        
        <style>
            /* 網頁按鈕的樣式設計 */
            .ui-container {
                position: absolute;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 9999; /* 確保按鈕在最上層 */
                text-align: center;
            }
            .ar-btn {
                padding: 15px 35px;
                font-size: 18px;
                font-weight: bold;
                background-color: #ff4757;
                color: white;
                border: none;
                border-radius: 50px;
                box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
                cursor: pointer;
                transition: transform 0.1s ease;
            }
            .ar-btn:active {
                transform: scale(0.95);
            }
        </style>
    </head>

    <body style="margin: 0; overflow: hidden;">

        <!-- 1. 蓋在畫面上的網頁按鈕 -->
        <div class="ui-container">
            <button class="ar-btn" onclick="triggerAR()">點我啟動動畫與聲音</button>
        </div>

        <!-- 2. AR 場景（已移除 marker 相關設定） -->
        <!-- 這裡修復了你原本標籤閉合的打字錯誤 (embeddedarjs 改為嵌入在 arjs 內) -->
        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; sourceWidth:1280; sourceHeight:720; displayWidth: 1280; displayHeight: 720; debugUIEnabled: false;"
            id="scene"
        >
            <a-assets>
                <!-- 3D 模型資源 -->
                <a-asset-item
                    id="animated-asset"
                    src="assets/asset.glb"
                ></a-asset-item>
                
                <!-- 2. 聲音資源：請把 src 改成你的 mp3 路徑 -->
                <audio id="my-audio" src="assets/12.mp3" preload="auto"></audio>
            </a-assets>

            
            <!-- position="0 -0.5 -2" 代表放在相機正前方 2 公尺、稍微偏下一點的位置 -->
            <!-- 初始狀態 visible="false"（隱藏），等待按鈕觸發 -->
            
                
            

            
        </a-scene>

        <!-- 4. 控制按鈕的 JavaScript -->
        <script>
            function triggerAR() {
                // 找到網頁中的模型、動畫和音訊元件
                var modelContainer = document.querySelector('#ar-model-container');
                var modelEntity = document.querySelector('#bowser-model');
                var audio = document.querySelector('#my-audio');

                // 動作 A：讓模型顯現
                modelContainer.setAttribute('visible', 'true');

                // 動作 B：動態賦予 animation-mixer 來播放 3D 內部動畫
                modelEntity.setAttribute('animation-mixer', {
                    clip: '*', 
                    loop: 'repeat'
                });

                // 動作 C：播放聲音（此時使用者已點擊按鈕，瀏覽器不會阻擋）
                audio.play().catch(function(error) {
                    console.log("聲音播放失敗:", error);
                });
            }
        </script>
    </body>
</html>
